# Render Blueprint — free, no credit card. Docker web service. The hive boots empty; an
# operator creates members and people pair with a code. The model key is baked from
# MINIMAX_API_KEY at boot, so the app comes up with a working model.
# Note: the free plan sleeps after ~15 min idle unless kept warm (e.g. a cron ping), and
# the ephemeral disk means data does not survive a full restart.
services:
  - type: web
    name: hive-demo
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: free
    autoDeploy: false
    envVars:
      - key: HIVE_MODEL
        value: MiniMax-M3
      - key: HIVE_LLM_DAILY_CAP
        value: "300"
      # set this as a secret in the Render dashboard (never commit it):
      - key: MINIMAX_API_KEY
        sync: false
      # optional, only if you use MiniMax's CN endpoint:
      # - key: HIVE_MINIMAX_BASE_URL
      #   value: https://api.minimaxi.com/anthropic
